    type: Documentation
  - url: https://www.stedi.com/edi/x12/transaction-set/214
    type: Reference
  - url: https://support.edifabric.com/hc/en-us/articles/360010385272-X12-214-Shipment-Status
    type: Documentation
  - url: https://www.spscommerce.com/edi-document/edi-214-shipment-status/
    type: GettingStarted
  - url: https://raw.githubusercontent.com/api-evangelist/edi-214/refs/heads/main/openapi/stedi-edi214-openapi.yml
    type: OpenAPI
  description: >-
    The EDI 214 (Transportation Carrier Shipment Status Message) is an ANSI X12 electronic data interchange standard transaction set used by transportation carriers to provide shippers, consignees, and agents with shipment status in terms of dates, times, locations, route, and conveyance. Key segments include B10 (tracking number), MS1 (current location), and AT7 (current status). EDI-to-HTTP gateways translate X12 214 segments into XML/JSON for carrier status updates, delivery confirmations, and exception reporting.
